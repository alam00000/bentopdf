services:
  hiiirepdf:
    # GitHub Container Registry (Recommended)
    # Self-Hosted build - ghcr.io/alam00000/hiiirepdf-simple:latest
    # Commercial build  - ghcr.io/alam00000/hiiirepdf:latest
    # Docker Hub (Alternative)
    # Self-Hosted build - ghcr.io/alam00000/hiiirepdf-simple:latest
    # Commercial build  - ghcr.io/alam00000/hiiirepdf:latest
    image: ghcr.io/alam00000/hiiirepdf-simple:latest
    container_name: hiiirepdf
    restart: unless-stopped
    ports:
      - '8080:8080'
    # For IPv4-only environments
    #environment:
    #  - DISABLE_IPV6=true
