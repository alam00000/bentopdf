<!doctype html>

    <meta name="robots" content="noindex, nofollow" />

    <link rel="canonical" href="https://pdf.hiiire.com/404" />

    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://pdf.hiiire.com/404" />
    <meta property="og:title" content="404 - Страница не найдена | hiiirePDF" />
    <meta
      property="og:description"
      content="Страница не найдена. PDF-инструменты доступны на главной странице hiiirePDF."
    />
    <meta property="og:site_name" content="hiiirePDF" />

    <meta name="twitter:card" content="summary" />
    <meta
      name="twitter:title"
      content="404 - Страница не найдена | hiiirePDF"
    />
    <meta
      name="twitter:description"
      content="Страница не найдена. Откройте главную страницу hiiirePDF."
    />

    <link href="/src/css/styles.css" rel="stylesheet" />
    <link rel="manifest" href="/site.webmanifest" />
    <link rel="icon" type="image/svg+xml" href="/images/favicon.svg" />
    <link
      rel="icon"
      type="image/png"
      sizes="192x192"
      href="/images/favicon-192x192.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="512x512"
      href="/images/favicon-512x512.png"
    />
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="/images/apple-touch-icon.png"
    />
    <link rel="icon" href="/favicon.ico" sizes="32x32" />

  <body class="antialiased bg-slate-50 text-slate-900">
    {{> navbar }}

    <div id="app" class="min-h-screen container mx-auto p-4 md:p-8">
      <section id="404-content" class="py-20 text-center md:py-32">
        <div class="mb-8">
          <h1
            class="text-8xl font-bold leading-none text-slate-950 md:text-[12rem]"
          >
            404
          </h1>
        </div>

        <h2 class="mb-4 text-3xl font-bold text-slate-950 md:text-5xl">
          Страница не найдена
        </h2>

        <p class="mx-auto mb-8 max-w-2xl text-lg leading-8 text-slate-600">
          Возможно, ссылка устарела или адрес введён с ошибкой. PDF-инструменты
          hiiirePDF доступны на главной странице.
        </p>

        <div
          class="flex flex-col items-center justify-center gap-4 sm:flex-row"
        >
          <a
            href="index.html"
            class="inline-flex items-center gap-3 rounded-lg bg-slate-950 px-6 py-3 font-semibold text-white transition-colors hover:bg-slate-800 focus:ring-2 focus:ring-slate-950 focus:ring-offset-2"
          >
            <span>На главную</span>
            <i data-lucide="home" class="h-5 w-5"></i>
          </a>

          <a
            href="/index.html#tools-header"
            class="inline-flex items-center gap-3 rounded-lg border border-slate-300 bg-white px-6 py-3 font-semibold text-slate-900 transition-colors hover:border-slate-400 hover:text-slate-950 focus:ring-2 focus:ring-slate-950 focus:ring-offset-2"
          >
            Открыть инструменты
          </a>
        </div>

        <div class="mt-16">
          <p class="mb-4 text-slate-500">Популярные инструменты:</p>
          <div class="flex flex-wrap justify-center gap-3">
            <a
              href="/merge-pdf"
              class="rounded-lg border border-slate-200 bg-white px-4 py-2 text-sm font-medium text-slate-700 transition-colors hover:border-slate-400 hover:text-slate-950"
            >
              Объединить PDF
            </a>
            <a
              href="/split-pdf"
              class="rounded-lg border border-slate-200 bg-white px-4 py-2 text-sm font-medium text-slate-700 transition-colors hover:border-slate-400 hover:text-slate-950"
            >
              Разделить PDF
            </a>
            <a
              href="/compress-pdf"
              class="rounded-lg border border-slate-200 bg-white px-4 py-2 text-sm font-medium text-slate-700 transition-colors hover:border-slate-400 hover:text-slate-950"
            >
              Сжать PDF
            </a>
            <a
              href="/edit-pdf"
              class="rounded-lg border border-slate-200 bg-white px-4 py-2 text-sm font-medium text-slate-700 transition-colors hover:border-slate-400 hover:text-slate-950"
            >
              Редактировать PDF
            </a>
          </div>
        </div>
      </section>
    </div>

    {{> footer }}

    <script type="module" src="src/js/utils/lucide-init.ts"></script>
    <script type="module" src="src/js/main.ts"></script>
    <script type="module" src="src/js/mobileMenu.ts"></script>

    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebPage",
        "name": "404 - Страница не найдена",
        "description": "Страница не найдена на hiiirePDF.",
