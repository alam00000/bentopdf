{{#if simpleMode}} {{> footer-simple}} {{else}}
<footer class="hirepdf-footer mt-12">
  <div class="container mx-auto px-4">
    <div class="flex flex-col gap-5 py-6 md:flex-row md:items-center md:justify-between">
      <div class="min-w-0">
        <span id="footer-brand" class="hirepdf-footer-brand">
          {{#if brandName}}{{brandName}}{{else}}hiiirePDF{{/if}}
        </span>
        <p
          id="footer-copyright"
          class="mt-2 text-sm text-slate-500"
        >
          {{#if footerText}}{{footerText}}{{else}}&copy; 2026 hiiirePDF. Все
          права защищены.{{/if}}
        </p>
        <p class="mt-1 text-xs text-slate-400">
          <span>Версия</span>
          <span id="app-version">{{appVersion}}</span>
        </p>
      </div>

      <div
        id="simple-mode-language-switcher"
        class="hirepdf-footer-language"
      ></div>
    </div>
  </div>
</footer>
{{/if}}
