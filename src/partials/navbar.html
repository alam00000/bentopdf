{{#if simpleMode}} {{> navbar-simple}} {{else}}
<nav class="hirepdf-navbar sticky top-0 z-30">
  <div class="container mx-auto px-4">
    <div class="flex h-14 items-center justify-between gap-4">
      <div class="flex min-w-0 flex-shrink-0 items-center" id="home-logo">
        <a href="index.html" id="nav-brand" class="hirepdf-wordmark truncate">
          {{#if brandName}}{{brandName}}{{else}}HirePDF{{/if}}
        </a>
      </div>

      <!-- Desktop Navigation -->
      <div class="hidden items-center gap-1 md:flex">
        <a href="index.html" class="nav-link">Главная</a>
        <a href="index.html#tools-header" class="nav-link">Инструменты</a>
        <a href="index.html#features-section" class="nav-link">Возможности</a>
        <a href="index.html#security-compliance-section" class="nav-link">
          Приватность
        </a>
      </div>

      <!-- Mobile Hamburger Button -->
      <div class="flex items-center md:hidden">
        <button
          id="mobile-menu-button"
          type="button"
          class="hirepdf-menu-button"
          aria-controls="mobile-menu"
          aria-expanded="false"
        >
          <span class="sr-only">Открыть меню</span>
          <!-- Hamburger Icon -->
          <svg
            id="menu-icon"
            class="block h-5 w-5"
            xmlns="http://www.w3.org/2000/svg"
            fill="none"
            viewBox="0 0 24 24"
            stroke="currentColor"
            aria-hidden="true"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M4 6h16M4 12h16M4 18h16"
            />
          </svg>
          <!-- Close Icon -->
          <svg
            id="close-icon"
            class="hidden h-5 w-5"
            xmlns="http://www.w3.org/2000/svg"
            fill="none"
            viewBox="0 0 24 24"
            stroke="currentColor"
            aria-hidden="true"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M6 18L18 6M6 6l12 12"
            />
          </svg>
        </button>
      </div>
    </div>
  </div>

  <!-- Mobile Menu Dropdown -->
  <div id="mobile-menu" class="hirepdf-mobile-menu hidden md:hidden">
    <div class="container mx-auto space-y-1 px-4 py-3">
      <a href="index.html" class="mobile-nav-link">Главная</a>
      <a href="index.html#tools-header" class="mobile-nav-link">Инструменты</a>
      <a href="index.html#features-section" class="mobile-nav-link">
        Возможности
      </a>
      <a href="index.html#security-compliance-section" class="mobile-nav-link">
        Приватность
      </a>
    </div>
  </div>
</nav>
{{/if}}
