<footer class="hirepdf-footer mt-12" data-simple-footer="true">
  <div class="container mx-auto px-4">
    <div
      class="flex flex-col gap-5 py-6 sm:flex-row sm:items-center sm:justify-between"
    >
      <div class="min-w-0">
        <span id="footer-brand" class="hirepdf-footer-brand">
          {{#if brandName}}{{brandName}}{{else}}hiiirePDF{{/if}}
        </span>
        <p id="footer-copyright" class="mt-2 text-sm text-slate-500">
          {{#if footerText}}{{footerText}}{{else}}&copy; 2026 hiiirePDF. Все
          права защищены.{{/if}}
        </p>
        <p class="mt-1 text-xs text-slate-400">
          <span>Версия</span>
          <span id="app-version">{{appVersion}}</span>
        </p>
      </div>
      <div id="simple-mode-lang-switcher" class="flex-shrink-0"></div>
    </div>
  </div>
</footer>
